<h1>Tableau de bord</h1>

<div class="row">
    <div class="col-md-5">
        <highcharts-chart
            [Highcharts]="salesByStore.Highcharts"
            [constructorType]="salesByStore.chartConstructor"
            [options]="salesByStore.chartOptions"
            [callbackFunction]="salesByStore.chartCallback"
            [(update)]="salesByStore.updateFlag"
            [oneToOne]="salesByStore.oneToOneFlag"
            [runOutsideAngular]="salesByStore.runOutsideAngular"
            ></highcharts-chart>
    </div>

    <div class="col-md-7">
        <highcharts-chart
            [Highcharts]="salesByFilmCategory.Highcharts"
            [constructorType]="salesByFilmCategory.chartConstructor"
            [options]="salesByFilmCategory.chartOptions"
            [callbackFunction]="salesByFilmCategory.chartCallback"

            [(update)]="salesByFilmCategory.updateFlag"
            [oneToOne]="salesByFilmCategory.oneToOneFlag"
            [runOutsideAngular]="salesByFilmCategory.runOutsideAngular"
            style="width: 100%; height: 400px; display: block;"
            ></highcharts-chart>
    </div>
</div>
