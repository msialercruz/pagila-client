<h3>Ajouter un film</h3>

<form [formGroup]="form">
    <div class="mt-3 mb-3">
        <h5>Information de base</h5>
        <div class="row mt-3">
            <div class="col col-md-6 mb-3">
                <label for="film-title" class="form-label">Titre *</label>
                <input
                    type="text"
                    class="form-control"
                    id="film-title"
                    formControlName="title"
                />
            </div>
            <div class="col col-md-3 mb-3">
                <label for="film-release-year" class="form-label"
                    >Année de sortie *</label
                >
                <input
                    id="film-release-year"
                    type="number"
                    class="form-control"
                    formControlName="releaseYear"
                />
            </div>
            <div class="col col-md-3 mb-3">
                <label for="film-length" class="form-label">Durée *</label>
                <input
                    type="number"
                    class="form-control"
                    id="film-length"
                    formControlName="length"
                />
            </div>
        </div>
        <div class="mb-3">
            <label for="film-language" class="form-label">Description *</label>
            <textarea
                class="form-control"
                id="film-description"
                rows="3"
                formControlName="description"
            ></textarea>
        </div>
        <div class="row">
            <div class="col col-md-4 mb-3">
                <label for="film-language" class="form-label">Langue</label>
                <select
                    id="film-language"
                    class="form-select"
                    formControlName="languageId"
                    *ngIf="languages$ | async as languages"
                >
                    <option
                        *ngFor="let language of languages"
                        [ngValue]="language.id"
                    >
                        {{ language.name }}
                    </option>
                </select>
            </div>
            <div class="col col-md-4 mb-3">
                <label for="film-original-language" class="form-label"
                    >Langue originale</label
                >
                <select
                    id="film-original-language"
                    class="form-select"
                    formControlName="originalLanguageId"
                    *ngIf="languages$ | async as languages"
                >
                    <option
                        *ngFor="let language of languages"
                        [ngValue]="language.id"
                    >
                        {{ language.name }}
                    </option>
                </select>
            </div>
            <div class="col col-md-4 mb-3">
                <label for="film-rating" class="form-label">Classement</label>
                <select
                    id="film-rating"
                    class="form-select"
                    formControlName="rating"
                >
                    <option *ngFor="let rating of ratings" [ngValue]="rating">
                        {{ rating }}
                    </option>
                </select>
            </div>
        </div>
    </div>

    <div class="mt-3 mb-3">
        <h5>Location et replacement</h5>
        <div class="row mt-3">
            <div class="col col-md-4 mb-3">
                <label for="film-rental-duration" class="form-label"
                    >Durée de location</label
                >
                <input
                    type="number"
                    class="form-control"
                    id="film-rental-duration"
                    formControlName="rentalDuration"
                />
            </div>
            <div class="col col-md-4 mb-3">
                <label for="film-rental-rate" class="form-label"
                    >Taux de location</label
                >
                <input
                    type="number"
                    class="form-control"
                    id="film-rental-rate"
                    formControlName="rentalRate"
                />
            </div>
            <div class="col col-md-4 mb-3">
                <label for="film-replacement-cost" class="form-label"
                    >Coût de replacement</label
                >
                <input
                    type="number"
                    class="form-control"
                    id="film-replacement-cost"
                    formControlName="replacementCost"
                />
            </div>
        </div>
    </div>

    <div class="mt-3 mb-3">
        <h5>Caracteristiques spéciales</h5>
        <film-special-features-list
            (featuresChanged)="onFeaturesChanged($event)"
        />
    </div>

    <div class="mt-3 mb-3">
        <button class="btn btn-secondary me-3">Annuler</button>
        <button class="btn btn-primary">Ajouter</button>
    </div>
</form>
