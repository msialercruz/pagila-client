resources:
    - name: git-repo
      type: git
      icon: github
      source:
          uri: git@github.com:msialercruz/pagila-client.git
          private_key: ((github_private_key))
          branch: develop # TODO: change this to master

    - name: node
      type: docker-image
      source:
          repository: node
          tag: 20.16.0

    - name: nginx
      type: docker-image
      source:
          repository: nginx
          tag: 1.27.1

    - name: pagila-client-image
      type: docker-image
      source:
          repository: ((pagila_client_dockerhub_repo))
          username: ((dockerhub_user))
          password: ((dockerhub_password))

jobs:
    - name: build-and-push-image
      plan:
          - get: git-repo
            trigger: true
          - get: node
            params:
                save: true
          - get: nginx
            params:
                save: true
          - task: set-new-version
            config:
                platform: linux
                image_resource:
                    type: registry-image
                    source:
                        repository: concourse/git-resource
                outputs:
                    - name: git-repo
                inputs:
                    - name: git-repo
                run:
                    path: /bin/sh
                    args:
                        - -cx
                        - |
                            cd git-repo
                            LAST_TAGGED_COMMIT=$(git rev-list --tags --max-count=1 2> /dev/null)

                            if [ ! -z "$LAST_TAGGED_COMMIT" ]; then
                                LATEST_TAG=$(git describe --tags $LAST_TAGGED_COMMIT)
                            else
                                LATEST_TAG=((pagila_client_dockerhub_default_tag))
                            fi
                            echo "$LATEST_TAG" >> VERSION

          - put: pagila-client-image
            params:
                build: git-repo
                tag_file: git-repo/VERSION
                cache_from:
                    - node
                    - nginx
                tag_as_latest: true
