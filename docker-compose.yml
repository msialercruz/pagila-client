version: '3'
services:
    pagila-client:
        container_name: pagila-client
        hostname: pagila-client
        ports:
            - 4200:4200
        networks:
            - pagila-network
        working_dir: /home/node/app
        volumes:
            - './:/home/node/app'
        build:
            context: .
            dockerfile: ./docker/Dockerfile
        command: 'sh /home/node/app/docker/entrypoint.sh'
networks:
    pagila-network:
        name: pagila-network
        external: true
